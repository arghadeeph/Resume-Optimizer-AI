services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: linkedin-optimizer-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: linkedin-optimizer-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/linkedin_optimizer
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - RATE_LIMIT_PER_MINUTE=20
    depends_on:
      - db
      - ollama

  db:
    image: postgres:16-alpine
    container_name: linkedin-optimizer-db
    environment:
      - POSTGRES_DB=linkedin_optimizer
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: linkedin-optimizer-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  ollama_data:
